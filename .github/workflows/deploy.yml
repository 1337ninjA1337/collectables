name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate required secrets
        run: |
          MISSING=0
          for VAR in EXPO_PUBLIC_SUPABASE_URL EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY; do
            VAL=$(printenv "$VAR" || true)
            if [ -z "$VAL" ]; then
              echo "ERROR: $VAR is required but not set" >&2
              MISSING=1
            fi
          done
          [ "$MISSING" = "0" ] || exit 1
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - name: Report optional Sentry secret status
        # Prints [set] or [missing] for each Sentry secret so a missing secret
        # is debuggable from the deploy log without leaking the value itself.
        run: |
          for VAR in EXPO_PUBLIC_SENTRY_DSN EXPO_PUBLIC_SENTRY_ENV SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            VAL=$(printenv "$VAR" || true)
            if [ -n "$VAL" ]; then
              echo "$VAR: [set] (length=${#VAL})"
            else
              echo "$VAR: [missing]"
            fi
          done
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SENTRY_ENV: ${{ secrets.EXPO_PUBLIC_SENTRY_ENV }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Build web
        run: npx expo export --platform web --source-maps
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SENTRY_ENV: ${{ secrets.EXPO_PUBLIC_SENTRY_ENV }}
          EXPO_PUBLIC_SENTRY_RELEASE: collectables@${{ github.sha }}
      - name: Upload sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        # Sentry sourcemap upload is best-effort — a token-scope / org-slug
        # mismatch should not gate the GitHub Pages deploy, since the runtime
        # Sentry SDK still works without uploaded sourcemaps (stack traces
        # arrive minified). See .sentry-setup.md §10 for the common causes.
        continue-on-error: true
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: collectables@${{ github.sha }}
          sourcemaps: ./dist
          ignore_missing: true
          ignore_empty: true
      - name: Add SPA fallback
        # Generates dist/404.html that captures the URL, stashes it in
        # sessionStorage, and redirects to the baseUrl so GitHub Pages serves
        # a 200 instead of a 404. The injected restore script in index.html
        # then replays the original URL via history.replaceState. Without
        # this, iOS Safari shows "A problem repeatedly occurred" on deep
        # links to dynamic Expo Router routes (e.g. /collection/<id>).
        run: npx tsx scripts/build-spa-fallback.ts
      - name: Strip sourcemap files from public artifact
        # Sentry has the .map files; don't ship them to GitHub Pages.
        run: find dist -name "*.map" -type f -delete
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
