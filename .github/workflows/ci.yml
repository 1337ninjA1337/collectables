name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The structural guard (lint:peer-dep-free) proves no *static* import of
  # @sentry/react-native in the sentry test surface; this job proves the
  # stronger runtime property — the whole @sentry scope can be absent from
  # node_modules (catching a transitive import via e.g. @sentry/core).
  # The --import setup file is load-bearing: without the global beforeEach
  # reset, module state leaks between suites and produces false failures.
  sentry-sdk-absent:
    name: Sentry tests with SDK absent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Delete the @sentry scope and run the sentry test surface
        run: |
          rm -rf node_modules/@sentry
          npx tsx --import ./__tests__/test-globals.ts --test __tests__/sentry-*.test.ts

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Expo/Metro build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.expo
            node_modules/.cache
          key: expo-metro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: expo-metro-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      # SEC-8: surface new high/critical dependency advisories on every PR.
      # Non-blocking (continue-on-error) — the deploy isn't wedged when the only
      # fix is a breaking major bump of a build-time dep. Triage in SECURITY.md.
      - name: Dependency audit (high+)
        continue-on-error: true
        run: npm audit --audit-level=high

      # Fails only on drift in the watched posthog-* packages (pinned
      # manually because the dev sandbox can't reach the Expo registry);
      # other expo-managed drift is advisory, registry outage is a skip.
      - name: Expo-recommended versions (posthog-* watched)
        run: npm run lint:expo-install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: No inline hex literals
        run: npm run lint:hex

      - name: Migrations documented in MANUAL-TASKS.md
        run: npm run lint:migration-docs

      - name: Migration filenames follow convention
        run: npm run lint:migration-naming

      - name: No committed secrets
        run: npm run lint:secrets

      - name: App Store config pre-flight
        run: npm run lint:appstore

      - name: Sentry SDK major pinned
        run: npm run lint:sentry-version

      - name: Run tests
        run: npm test

      - name: Web build
        run: npm run build

      - name: No secrets in web bundle
        run: npm run lint:secrets:bundle

      # Fails when the exported JS bundle exceeds the 4.5 MiB budget — catches
      # a heavy SDK (posthog-js, replay tooling) accidentally becoming a static
      # import instead of a lazy import(). Override via BUNDLE_SIZE_BUDGET_BYTES.
      - name: Bundle size within budget
        run: npm run lint:bundle-size

      - name: Bundle smoke check
        run: |
          BUNDLE=$(ls dist/_expo/static/js/web/*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: no web bundle found in dist/_expo/static/js/web/" >&2
            exit 1
          fi
          echo "Checking bundle: $BUNDLE"
          # Verify key i18n keys are present in the bundle (catches missing provider or stale key regressions)
          for KEY in marketplaceListOnMarketplace marketplaceTitle addItem createCollection signOut; do
            if ! grep -q "$KEY" "$BUNDLE"; then
              echo "ERROR: expected key '$KEY' not found in bundle" >&2
              exit 1
            fi
          done
          # Verify core providers are wired in the bundle
          for PROVIDER in MarketplaceProvider CollectionsProvider SocialProvider AuthProvider; do
            if ! grep -q "$PROVIDER" "$BUNDLE"; then
              echo "ERROR: expected provider '$PROVIDER' not found in bundle" >&2
              exit 1
            fi
          done
          # Verify all six i18n language translation maps are present (catches tree-shaking regressions)
          for LANG in '"ru"' '"en"' '"be"' '"pl"' '"de"' '"es"'; do
            if ! grep -q "$LANG" "$BUNDLE"; then
              echo "ERROR: i18n language code $LANG not found in bundle" >&2
              exit 1
            fi
          done
          echo "Bundle smoke check passed."

      - name: Privacy page smoke check
        # npm run build runs build-spa-fallback.ts, which emits the static
        # /privacy page from PRIVACY.md — verify the rendered output survived.
        run: |
          if [ ! -f dist/privacy/index.html ]; then
            echo "ERROR: dist/privacy/index.html missing — /privacy page not emitted" >&2
            exit 1
          fi
          if ! grep -q "Privacy Policy" dist/privacy/index.html; then
            echo "ERROR: dist/privacy/index.html does not contain 'Privacy Policy'" >&2
            exit 1
          fi
          echo "Privacy page smoke check passed."
