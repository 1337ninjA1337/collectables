name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Expo/Metro build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.expo
            node_modules/.cache
          key: expo-metro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: expo-metro-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      # SEC-8: surface new high/critical dependency advisories on every PR.
      # Non-blocking (continue-on-error) — the deploy isn't wedged when the only
      # fix is a breaking major bump of a build-time dep. Triage in SECURITY.md.
      - name: Dependency audit (high+)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      - name: No inline hex literals
        run: npm run lint:hex

      - name: Migrations documented in MANUAL-TASKS.md
        run: npm run lint:migration-docs

      - name: Migration filenames follow convention
        run: npm run lint:migration-naming

      - name: No committed secrets
        run: npm run lint:secrets

      - name: App Store config pre-flight
        run: npm run lint:appstore

      - name: Sentry SDK major pinned
        run: npm run lint:sentry-version

      - name: Run tests
        run: npm test

      - name: Web build
        run: npm run build

      - name: No secrets in web bundle
        run: npm run lint:secrets:bundle

      - name: Bundle smoke check
        run: |
          BUNDLE=$(ls dist/_expo/static/js/web/*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: no web bundle found in dist/_expo/static/js/web/" >&2
            exit 1
          fi
          echo "Checking bundle: $BUNDLE"
          # Verify key i18n keys are present in the bundle (catches missing provider or stale key regressions)
          for KEY in marketplaceListOnMarketplace marketplaceTitle addItem createCollection signOut; do
            if ! grep -q "$KEY" "$BUNDLE"; then
              echo "ERROR: expected key '$KEY' not found in bundle" >&2
              exit 1
            fi
          done
          # Verify core providers are wired in the bundle
          for PROVIDER in MarketplaceProvider CollectionsProvider SocialProvider AuthProvider; do
            if ! grep -q "$PROVIDER" "$BUNDLE"; then
              echo "ERROR: expected provider '$PROVIDER' not found in bundle" >&2
              exit 1
            fi
          done
          # Verify all six i18n language translation maps are present (catches tree-shaking regressions)
          for LANG in '"ru"' '"en"' '"be"' '"pl"' '"de"' '"es"'; do
            if ! grep -q "$LANG" "$BUNDLE"; then
              echo "ERROR: i18n language code $LANG not found in bundle" >&2
              exit 1
            fi
          done
          echo "Bundle smoke check passed."
